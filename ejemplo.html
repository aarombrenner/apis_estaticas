<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Clientes - API Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }

        .result.success {
            background: #d4edda;
            border: 2px solid #c3e6cb;
            color: #155724;
        }

        .result.error {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            color: #721c24;
        }

        .result.loading {
            background: #d1ecf1;
            border: 2px solid #bee5eb;
            color: #0c5460;
        }

        .result h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .client-info {
            margin-top: 15px;
        }

        .client-info p {
            margin: 8px 0;
            font-size: 14px;
        }

        .client-info strong {
            color: #333;
        }

        .note {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            font-size: 13px;
            color: #856404;
        }

        .note strong {
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Validador de Clientes</h1>
        <p class="subtitle">Ingresa un DNI para consultar si el cliente está registrado</p>

        <form id="validarForm">
            <div class="form-group">
                <label for="dni">DNI del Cliente</label>
                <input 
                    type="text" 
                    id="dni" 
                    name="dni" 
                    placeholder="Ej: 12345678"
                    maxlength="8"
                    pattern="[0-9]{8}"
                    required
                >
            </div>
            <button type="submit">Validar Cliente</button>
        </form>

        <div id="resultado" class="result"></div>

        <div class="note">
            <strong>✅ API Configurada:</strong>
            Esta aplicación está conectada a tu API en GitHub (usuario: aarombrenner).
        </div>
    </div>

    <script>
        // API configurada para el usuario: aarombrenner
        const API_URL = 'https://my-json-server.typicode.com/aarombrenner/apis_estaticas';

        const form = document.getElementById('validarForm');
        const dniInput = document.getElementById('dni');
        const resultado = document.getElementById('resultado');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const dni = dniInput.value.trim();
            
            if (dni.length !== 8) {
                mostrarError('El DNI debe tener 8 dígitos');
                return;
            }

            await validarCliente(dni);
        });

        async function validarCliente(dni) {
            mostrarCargando();

            try {
                const response = await fetch(`${API_URL}/clientes?dni=${dni}`);
                
                if (!response.ok) {
                    throw new Error('Error al consultar la API');
                }

                const clientes = await response.json();

                if (clientes.length > 0) {
                    mostrarExito(clientes[0]);
                } else {
                    mostrarNoEncontrado(dni);
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarError('Error al conectar con la API. Verifica que hayas configurado correctamente tu usuario de GitHub en el código.');
            }
        }

        function mostrarCargando() {
            resultado.className = 'result loading';
            resultado.style.display = 'block';
            resultado.innerHTML = '<h3>⏳ Consultando...</h3><p>Buscando cliente en la base de datos...</p>';
        }

        function mostrarExito(cliente) {
            resultado.className = 'result success';
            resultado.style.display = 'block';
            resultado.innerHTML = `
                <h3>✅ Cliente Encontrado</h3>
                <div class="client-info">
                    <p><strong>DNI:</strong> ${cliente.dni}</p>
                    <p><strong>Nombre:</strong> ${cliente.nombre} ${cliente.apellido}</p>
                    <p><strong>Email:</strong> ${cliente.email}</p>
                    <p><strong>Celular:</strong> ${cliente.celular}</p>
                    <p><strong>Dirección:</strong> ${cliente.direccion}</p>
                </div>
            `;
        }

        function mostrarNoEncontrado(dni) {
            resultado.className = 'result error';
            resultado.style.display = 'block';
            resultado.innerHTML = `
                <h3>❌ Cliente No Registrado</h3>
                <p>No se encontró ningún cliente con el DNI: <strong>${dni}</strong></p>
                <p style="margin-top: 10px; font-size: 13px;">El cliente debe registrarse antes de continuar.</p>
            `;
        }

        function mostrarError(mensaje) {
            resultado.className = 'result error';
            resultado.style.display = 'block';
            resultado.innerHTML = `
                <h3>⚠️ Error</h3>
                <p>${mensaje}</p>
            `;
        }

        // Validar solo números en el input
        dniInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
